name: Dashboard Auto Refresh

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours
    - cron: "15 */4 * * *"

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
      NOTION_RISKS_DB_ID: ${{ secrets.NOTION_RISKS_DB_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild dashboard + docs
        run: npm run dashboard:pages

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.html docs/
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-refresh schedule dashboard"
          git push
